name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build index.md from README
        run: |
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Home'
            echo '---'
            echo ''
            echo '## Documentation'
            echo ''
            echo '- [CLI Reference](cli-reference.html) — full command listing with flags and examples'
            echo '- [Cheatsheet](qdo-cheatsheet.html) — visual quick-reference card'
            echo '- [GitHub Repository](https://github.com/curtisalexander/querido)'
            echo ''
            python - <<'PY'
          from pathlib import Path

          text = Path("README.md").read_text()
          replacements = {
              "./LICENSE": "https://github.com/curtisalexander/querido/blob/main/LICENSE",
              "./DIFFERENTIATION.md": "https://github.com/curtisalexander/querido/blob/main/DIFFERENTIATION.md",
              "./RELEASING.md": "https://github.com/curtisalexander/querido/blob/main/RELEASING.md",
              "./docs/cli-reference.md": "./cli-reference.html",
              "./docs/examples/README.md": "https://github.com/curtisalexander/querido/tree/main/docs/examples",
              "./integrations/skills/SKILL.md": "./agent-claude.html",
              "./integrations/continue/qdo.md": "./agent-continue.html",
              "./integrations/skills/WORKFLOW_AUTHORING.md": "./workflow-authoring.html",
              "./ARCHITECTURE.md": "https://github.com/curtisalexander/querido/blob/main/ARCHITECTURE.md",
              "./AGENTS.md": "https://github.com/curtisalexander/querido/blob/main/AGENTS.md",
              "./PLAN.md": "https://github.com/curtisalexander/querido/blob/main/PLAN.md",
          }
          for source, target in replacements.items():
              text = text.replace(source, target)
          remaining = [
              link
              for link in __import__("re").findall(r"\]\((\./[^)]+)\)", text)
              if not link.split("#", 1)[0].endswith(".html")
          ]
          if remaining:
              raise SystemExit(f"unmapped README links for Pages: {remaining}")
          print(text, end="")
          PY
          } > docs/index.md

      - name: Build agent integration docs
        run: |
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Agent Integrations'
            echo '---'
            echo ''
            echo '# Agent Integrations'
            echo ''
            echo 'Install these files from the qdo CLI:'
            echo ''
            echo '```bash'
            echo 'qdo agent install skill'
            echo 'qdo agent install continue'
            echo '```'
            echo ''
            echo '## Claude Code'
            echo ''
            echo 'Installs `skills/querido/SKILL.md` plus workflow authoring references.'
            echo ''
            echo '## Continue.dev'
            echo ''
            echo 'Installs `.continue/rules/qdo.md`.'
            echo ''
            echo '## Source Files'
            echo ''
            echo '- [Claude Code SKILL.md](agent-claude.html)'
            echo '- [Continue.dev qdo.md](agent-continue.html)'
            echo '- [Workflow Authoring](workflow-authoring.html)'
            echo '- [Workflow Examples](workflow-examples.html)'
          } > docs/agent-integrations.md
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Claude Code Integration'
            echo '---'
            echo ''
            cat integrations/skills/SKILL.md
          } > docs/agent-claude.md
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Continue.dev Integration'
            echo '---'
            echo ''
            cat integrations/continue/qdo.md
          } > docs/agent-continue.md
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Workflow Authoring'
            echo '---'
            echo ''
            cat integrations/skills/WORKFLOW_AUTHORING.md
          } > docs/workflow-authoring.md
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Workflow Examples'
            echo '---'
            echo ''
            cat integrations/skills/WORKFLOW_EXAMPLES.md
          } > docs/workflow-examples.md

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
