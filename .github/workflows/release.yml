name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          runtime_version="$(python -c 'import runpy; print(runpy.run_path("src/querido/__init__.py")["__version__"])')"
          test "$project_version" = "$runtime_version" || {
            echo "project version $project_version does not match runtime version $runtime_version" >&2
            exit 1
          }
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
              echo "release tag must have the form vX.Y.Z: $GITHUB_REF_NAME" >&2
              exit 1
            }
            test "${GITHUB_REF_NAME#v}" = "$project_version" || {
              echo "tag $GITHUB_REF_NAME does not match package version $project_version" >&2
              exit 1
            }
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
              echo "tagged commit must be part of main" >&2
              exit 1
            }
          fi
      - name: Build wheel and sdist
        run: uv build
      - name: Validate artifacts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import tomllib

          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          actual = sorted(
              path.name for path in pathlib.Path("dist").iterdir() if not path.name.startswith(".")
          )
          expected = sorted(
              [
                  f"querido-{version}-py3-none-any.whl",
                  f"querido-{version}.tar.gz",
              ]
          )
          if actual != expected:
              raise SystemExit(f"unexpected release artifacts: expected {expected}, got {actual}")
          PY
          uvx twine check dist/*
      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/querido-*-py3-none-any.whl)"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          uv venv .smoke
          uv pip install --python .smoke/bin/python "$wheel"
          test "$(.smoke/bin/qdo --version)" = "qdo $version"
          .smoke/bin/qdo --help
          .smoke/bin/qdo agent list
          python - <<'PY'
          import sqlite3

          with sqlite3.connect('/tmp/qdo-smoke.db') as conn:
              conn.execute(
                  'create table orders (order_id integer primary key, status text, amount real)'
              )
              conn.execute(
                  "insert into orders (order_id, status, amount) values (1, 'shipped', 42.5)"
              )
          PY
          .smoke/bin/qdo preview -c /tmp/qdo-smoke.db -t orders -r 1 -f json
          .smoke/bin/qdo agent install skill --path /tmp/qdo-skill-smoke
          test -f /tmp/qdo-skill-smoke/SKILL.md
      - name: Smoke test built sdist
        shell: bash
        run: |
          set -euo pipefail
          sdist="$(ls dist/querido-*.tar.gz)"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          uv venv .smoke-sdist
          uv pip install --python .smoke-sdist/bin/python "$sdist"
          test "$(.smoke-sdist/bin/qdo --version)" = "qdo $version"
          .smoke-sdist/bin/qdo --help
          .smoke-sdist/bin/qdo agent list
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --latest

  # Disabled unless the PUBLISH_PYPI repository variable is exactly "true".
  # Publishes via PyPI trusted publishing (OIDC), with no stored API token.
  publish-pypi:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
