name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel and sdist
        run: uv build
      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/querido-*-py3-none-any.whl)"
          uv venv .smoke
          uv pip install --python .smoke/bin/python "$wheel"
          .smoke/bin/qdo --version
          .smoke/bin/qdo --help
          .smoke/bin/qdo agent list
          .smoke/bin/qdo preview -c data/test.db -t orders -r 1 -f json
          .smoke/bin/qdo agent install skill --path /tmp/qdo-skill-smoke
          test -f /tmp/qdo-skill-smoke/SKILL.md
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: dist/*
