<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }} — {{ site.title }}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f4f5f7;
    color: #1e293b;
    line-height: 1.6;
    font-size: 15px;
  }

  /* ── Page shell ── */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ── Site header ── */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 3px solid #6366f1;
  }
  .site-header h1 {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .site-header h1 a {
    color: #6366f1;
    text-decoration: none;
  }
  .site-header h1 a:hover { opacity: 0.85; }
  .site-header .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    margin-top: 4px;
  }
  .site-nav {
    display: flex;
    gap: 16px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .site-nav a {
    color: #4338ca;
    text-decoration: none;
    padding: 4px 10px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .site-nav a:hover {
    background: #eef2ff;
  }

  /* ── Content card ── */
  .content {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-top: 3px solid #6366f1;
    border-radius: 8px;
    padding: 32px 36px;
  }

  /* ── Typography ── */
  .content h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #1e293b;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid #eef2ff;
  }
  .content h2 {
    font-size: 1.15rem;
    font-weight: 800;
    color: #4338ca;
    margin-top: 32px;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .content h3 {
    font-size: 0.95rem;
    font-weight: 700;
    color: #334155;
    margin-top: 24px;
    margin-bottom: 8px;
  }
  .content p {
    margin-bottom: 12px;
    color: #334155;
  }
  .content blockquote {
    border-left: 3px solid #6366f1;
    padding: 8px 16px;
    margin: 12px 0;
    background: #f8fafc;
    border-radius: 0 6px 6px 0;
    color: #64748b;
    font-size: 0.9rem;
  }
  .content blockquote strong {
    color: #4338ca;
  }
  .content a {
    color: #4338ca;
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid #c7d2fe;
    transition: border-color 0.15s;
  }
  .content a:hover {
    border-bottom-color: #4338ca;
  }

  /* ── Lists ── */
  .content ul, .content ol {
    margin: 8px 0 12px 20px;
    color: #334155;
  }
  .content li {
    margin-bottom: 4px;
  }
  .content li code {
    font-size: 0.88em;
  }

  /* ── Inline code ── */
  .content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    font-weight: 500;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    padding: 1px 6px;
    color: #4338ca;
  }

  /* ── Code blocks ── */
  .content pre {
    background: #1e293b;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 12px 0 16px;
    overflow-x: auto;
    line-height: 1.5;
  }
  .content pre code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 400;
    background: none;
    border: none;
    padding: 0;
    color: #e2e8f0;
  }

  /* ── Tables ── */
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 16px;
    font-size: 0.88rem;
  }
  .content thead th {
    background: #eef2ff;
    color: #4338ca;
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 2px solid #c7d2fe;
  }
  .content tbody td {
    padding: 7px 12px;
    border-bottom: 1px solid #f1f5f9;
    color: #334155;
  }
  .content tbody tr:hover {
    background: #f8fafc;
  }
  .content tbody td code {
    font-size: 0.82em;
    white-space: nowrap;
  }

  /* ── Horizontal rule ── */
  .content hr {
    border: none;
    border-top: 2px solid #eef2ff;
    margin: 28px 0;
  }

  /* ── Footer ── */
  .site-footer {
    margin-top: 24px;
    padding-top: 12px;
    border-top: 2px solid #e2e8f0;
    font-size: 0.78rem;
    color: #94a3b8;
    display: flex;
    justify-content: space-between;
  }
  .site-footer a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 600;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .page { padding: 16px 12px 48px; }
    .content { padding: 20px 18px; }
    .site-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .site-nav { gap: 8px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div>
      <h1><a href="{{ '/' | relative_url }}">querido</a></h1>
      <div class="subtitle">CLI data analysis toolkit — SQLite, DuckDB, Snowflake, Parquet</div>
    </div>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/cli-reference' | relative_url }}">CLI Reference</a>
      <a href="{{ '/qdo-cheatsheet.html' | relative_url }}">Cheatsheet</a>
      <a href="https://github.com/curtisalexander/querido">GitHub</a>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span><a href="https://github.com/curtisalexander/querido">querido</a> — your data is dear to you</span>
    <span>Python 3.12+ &middot; <code style="font-size:0.82rem; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:4px; padding:1px 6px; color:#4338ca;">uv pip install querido</code></span>
  </footer>

</div>
</body>
</html>
