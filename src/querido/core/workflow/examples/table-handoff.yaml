# why: "conditional composition" teaching pattern — run each step only when
# the previous step produced something worth acting on. Unlike the
# table-summary example (which runs all three scans unconditionally),
# this one teaches:
#   1. null-safe ``when:`` comparisons (the ``!= null and`` idiom)
#   2. how to gate an expensive step on a cheap probe's result
#   3. how outputs degrade to ``null`` when a step is skipped
# A coding agent reading this file learns: if your table might be empty
# or might not exist yet, gate the scans rather than letting them fail.
name: table-handoff
description: Summarize a table with row-count-gated profile and quality steps.
version: 1
inputs:
  connection:
    type: connection
    required: true
    description: Target connection (named or file path).
  table:
    type: table
    required: true
    description: Table to summarize.
steps:
  # why: inspect is the cheapest probe — it hits the information_schema or
  # sqlite_master, not the data. Captured so downstream steps can decide
  # whether it's worth running the heavier scans.
  - id: schema
    run: qdo -f json inspect -c ${connection} -t ${table}
    capture: schema

  # why: profile runs only when the table has rows. ``row_count`` can
  # legitimately be ``null`` for views or when the connector couldn't
  # cheaply determine a count, so guard with the null-safe idiom
  # before the ordering comparison. Otherwise a null would raise
  # ``ExpressionError: cannot compare None > 0`` at runtime.
  - id: stats
    when: ${schema.data.row_count} != null and ${schema.data.row_count} > 0
    run: qdo -f json profile -c ${connection} -t ${table} --quick
    capture: stats

  # why: quality is worth running when profile produced something. If
  # ``stats`` was skipped above, ``${stats.data}`` resolves to ``null``
  # and this step skips too — the runner doesn't abort on refs that
  # belong to skipped steps.
  - id: callouts
    when: ${stats.data} != null
    run: qdo -f json quality -c ${connection} -t ${table}
    capture: callouts

outputs:
  # Outputs degrade gracefully when steps skip: ``profile`` and ``quality``
  # resolve to null on empty tables rather than aborting the run. That's
  # the whole point of the conditional composition — the handoff document
  # still lands, it just honestly says "no rows yet, no profile".
  table: ${table}
  row_count: ${schema.data.row_count}
  schema: ${schema.data.columns}
  profile: ${stats.data.columns}
  quality: ${callouts.data.columns}
