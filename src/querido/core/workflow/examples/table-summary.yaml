# why: the three scans below are the core "know this table" primitives.
# A coding agent reading this file learns the composition:
# inspect (schema) → profile (row counts + basics) → quality (callouts).
name: table-summary
description: Inspect a table, profile it, and surface quality callouts.
version: 1
inputs:
  connection:
    type: connection
    required: true
    description: Target connection (named or file path).
  table:
    type: table
    required: true
    description: Table to summarize.
steps:
  # why: inspect gives the authoritative column list, PK/nullable flags, and
  # comments. Captured as ${schema} so downstream could gate on column shape.
  - id: inspect
    run: qdo -f json inspect -c ${connection} -t ${table}
    capture: schema
  # why: --quick is the right profile mode for a generic summary — one scan,
  # no per-column frequency queries. Use the non-quick form only when the
  # workflow is scoped to a known-narrow table.
  - id: profile
    run: qdo -f json profile -c ${connection} -t ${table} --quick
    capture: stats
  # why: quality surfaces null-rate and uniqueness anomalies that profile
  # alone won't flag. Captured so callers can drive follow-up decisions.
  - id: quality
    run: qdo -f json quality -c ${connection} -t ${table}
    capture: quality
outputs:
  row_count: ${stats.data.row_count}
  columns: ${schema.data.columns}
  quality_columns: ${quality.data.columns}
