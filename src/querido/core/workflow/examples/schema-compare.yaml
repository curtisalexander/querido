# why: teaches the conditional step pattern. Steps 2 and 3 only run when
# the schemas actually differ, so an agent reading this sees both
# composition (diff then joins) and flow control (`when:`).
name: schema-compare
description: Compare two tables' schemas and, if they differ, discover join keys.
version: 1
inputs:
  connection:
    type: connection
    required: true
  left:
    type: table
    required: true
    description: First table.
  right:
    type: table
    required: true
    description: Second table.
steps:
  # why: diff returns three lists (added/removed/changed). Capturing it lets
  # the next step gate on non-empty diffs without rescanning either table.
  - id: diff
    run: qdo -f json diff -c ${connection} -t ${left} --target ${right}
    capture: diff
  - id: joins
    # why: only bother discovering join keys when the schemas actually differ.
    # A non-empty `changed` list is the simplest signal without needing
    # helper functions in the expression grammar.
    when: ${diff.data.changed} or ${diff.data.added} or ${diff.data.removed}
    run: qdo -f json joins -c ${connection} -t ${left} --target ${right}
    capture: joins
outputs:
  changed_columns: ${diff.data.changed}
  added_columns: ${diff.data.added}
  removed_columns: ${diff.data.removed}
  candidate_join_keys: ${joins.data.candidates}
