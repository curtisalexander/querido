{% extends "base.html" %}
{% block title %}Pivot: {{ table_name }} — qdo{% endblock %}

{% block content %}
<h1 class="page-title">Pivot: {{ table_name }}</h1>
<p class="page-subtitle"><a href="/table/{{ table_name }}">Back to table</a></p>

<form class="pivot-form"
      hx-post="/fragments/pivot/{{ table_name }}"
      hx-target="#pivot-result"
      hx-indicator="#global-indicator">

  <fieldset>
    <legend>Group by (rows)</legend>
    <label for="pivot-rows" class="sr-only">Select columns to group by</label>
    <select id="pivot-rows" name="rows" multiple size="6" required aria-required="true">
      {% for col in columns %}
      <option value="{{ col.name }}">{{ col.name }} ({{ col.type }})</option>
      {% endfor %}
    </select>
  </fieldset>

  <fieldset>
    <legend>Aggregate (values)</legend>
    <label for="pivot-values" class="sr-only">Select columns to aggregate</label>
    <select id="pivot-values" name="values" multiple size="6" required aria-required="true">
      {% for col in columns %}
      <option value="{{ col.name }}">{{ col.name }} ({{ col.type }})</option>
      {% endfor %}
    </select>
  </fieldset>

  <fieldset>
    <legend>Aggregation function</legend>
    <label for="pivot-agg" class="sr-only">Select aggregation function</label>
    <select id="pivot-agg" name="agg">
      <option value="COUNT">COUNT</option>
      <option value="SUM">SUM</option>
      <option value="AVG">AVG</option>
      <option value="MIN">MIN</option>
      <option value="MAX">MAX</option>
    </select>
  </fieldset>

  <button type="submit" class="submit-btn">Run pivot</button>
</form>

<div id="pivot-result"></div>
{% endblock %}
