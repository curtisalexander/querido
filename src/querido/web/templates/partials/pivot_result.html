{% if not rows %}
<p class="empty-msg">No results.</p>
{% else %}
<p class="page-subtitle">{{ rows|length }} row(s)</p>

<div class="toolbar">
  <input type="text" placeholder="Filter results..." data-filter-table="pivot-table">
  <span class="badge" data-count-for="pivot-table"></span>
  <button onclick="copyTable('pivot-table')">Copy</button>
  <button onclick="exportCSV('pivot-table')">Export CSV</button>
</div>

<div class="table-wrapper">
  <table id="pivot-table" data-sortable>
    <thead>
      <tr>
        {% for h in headers %}
        <th>{{ h }}<span class="sort-arrow"></span></th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr data-idx="{{ loop.index0 }}">
        {% for h in headers %}
        {% set val = row[h] %}
        {% if val is none %}
        <td class="null-val">NULL</td>
        {% else %}
        <td>{{ val }}</td>
        {% endif %}
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<details style="margin-top:12px">
  <summary style="cursor:pointer;font-size:0.85rem;color:#6c757d">Show SQL</summary>
  <div class="code-block" style="margin-top:8px">{{ sql }}</div>
</details>
{% endif %}
