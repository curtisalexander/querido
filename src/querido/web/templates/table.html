{% extends "base.html" %}
{% block title %}{{ table_name }} — qdo{% endblock %}

{% block content %}
<h1 class="page-title">{{ table_name }}</h1>
<p class="page-subtitle">
  <span class="table-type-badge">{{ table_type }}</span>
</p>

<div class="tab-bar">
  <a href="#" class="active"
     hx-get="/fragments/inspect/{{ table_name }}"
     hx-target="#tab-content"
     hx-indicator="#global-indicator"
     onclick="activateTab(this)">Inspect</a>
  <a href="#"
     hx-get="/fragments/preview/{{ table_name }}"
     hx-target="#tab-content"
     hx-indicator="#global-indicator"
     onclick="activateTab(this)">Preview</a>
  <a href="#"
     hx-get="/fragments/profile/{{ table_name }}"
     hx-target="#tab-content"
     hx-indicator="#global-indicator"
     onclick="activateTab(this)">Profile</a>
  <a href="#"
     hx-get="/fragments/template/{{ table_name }}"
     hx-target="#tab-content"
     hx-indicator="#global-indicator"
     onclick="activateTab(this)">Template</a>
  {% if table_type == "view" %}
  <a href="#"
     hx-get="/fragments/lineage/{{ table_name }}"
     hx-target="#tab-content"
     hx-indicator="#global-indicator"
     onclick="activateTab(this)">Lineage</a>
  {% endif %}
  <a href="/table/{{ table_name }}/pivot">Pivot</a>
</div>

<div id="tab-content"
     hx-get="/fragments/inspect/{{ table_name }}"
     hx-trigger="load"
     hx-indicator="#global-indicator">
  <span class="spinner"></span> Loading...
</div>
{% endblock %}
